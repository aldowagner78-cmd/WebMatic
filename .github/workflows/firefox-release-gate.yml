name: Firefox Release Gate

on:
  push:
    branches: [ master, hardening/release-stability ]
  pull_request:
    branches: [ master ]

jobs:
  verify-firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Install Playwright Firefox runtime
        run: npx playwright install --with-deps firefox

      - name: Prepare log folder
        run: mkdir -p artifacts/ci-logs

      - name: npm test
        run: npm test 2>&1 | tee artifacts/ci-logs/npm-test.log

      - name: verify fast
        run: npm run verify:v2:firefox:fast 2>&1 | tee artifacts/ci-logs/verify-fast.log

      - name: verify full
        env:
          ALLOW_PLAYWRIGHT_FIREFOX_SKIP: "0"
          IAPOS_E2E_REAL: "0"
        run: npm run verify:v2:firefox:full 2>&1 | tee artifacts/ci-logs/verify-full.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-release-gate-logs
          path: artifacts/ci-logs/
