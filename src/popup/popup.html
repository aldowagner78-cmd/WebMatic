<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebMatic</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 220px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f8fafc;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .row {
        display: grid;
        gap: 8px;
      }

      button {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        cursor: pointer;
      }

      #rec-bar {
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(239,68,68,0.95);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      #rec-bar.active { display: flex; }

      #rec-dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: #fff;
        animation: pulse 0.8s infinite;
        flex-shrink: 0;
      }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

      #rec-stop-btn {
        all: initial;
        background: #fff;
        color: #dc2626;
        border-radius: 5px;
        padding: 3px 8px;
        font-size: 11px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        margin-left: auto;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h1>WebMatic</h1>
    <div id="rec-bar">
      <span id="rec-dot"></span>
      <span>Grabando pasos</span>
      <button id="rec-stop-btn">⏹ Detener</button>
    </div>
    <div class="row">
      <button id="togglePanel">Abrir/Cerrar panel</button>
      <button id="dockLeft">Dock Left</button>
      <button id="dockRight">Dock Right</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
