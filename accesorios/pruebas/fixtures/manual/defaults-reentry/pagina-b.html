<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página B - Defaults Recording Fixture</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; }
    label { display: block; margin: 10px 0 4px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 6px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 20px; background: #0ea5e9; color: white; border: none; cursor: pointer; }
    nav { margin-bottom: 20px; }
    nav a { margin-right: 12px; color: #059669; }
  </style>
</head>
<body>
  <h1>Página B</h1>
  <nav>
    <a href="pagina-a.html">Volver a Página A</a>
  </nav>
  <form id="form-b" onsubmit="return false">
    <label for="observacion">Observación</label>
    <textarea id="observacion" name="observacion" rows="3"></textarea>

    <label for="motivo">Motivo</label>
    <select id="motivo" name="motivo">
      <option value="" selected>Seleccione...</option>
      <option value="auditoria">Auditoría</option>
      <option value="revision">Revisión</option>
      <option value="consulta">Consulta</option>
    </select>

    <button type="submit">Confirmar (sólo fixture - no hace nada)</button>
  </form>
  <p style="font-size:12px;color:#64748b;margin-top:20px;">
    Fixture local para prueba manual de auto-defaults recording.
    Valores por defecto: observacion=vacío, motivo=vacío.
  </p>
</body>
</html>
