<form id="labelled-form">
  <label id="wrap-check-label">
    <input id="hidden-wrap-check" type="checkbox" style="display:none">
    Activar wrapper
  </label>

  <input id="hidden-for-check" type="checkbox" style="display:none">
  <label id="for-check-label" for="hidden-for-check">Activar for</label>

  <input id="hidden-for-radio" type="radio" name="hidden-choice" value="yes" style="display:none">
  <label id="for-radio-label" for="hidden-for-radio">Elegir radio oculto</label>

  <div id="role-check" role="checkbox">
    <input id="role-check-input" type="checkbox" style="display:none">
    Rol checkbox
  </div>

  <div id="role-radio" role="radio">
    <input id="role-radio-input" type="radio" name="role-choice" style="display:none">
    Rol radio
  </div>
</form>
